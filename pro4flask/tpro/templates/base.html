<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AI 쇼핑몰{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🚀 AI 홈쇼핑</a>
            <a href="/cart" class="btn btn-outline-light position-relative">
                🛒 장바구니
                <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    {{ cart_count if cart_count else 0 }}
                </span>
            </a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // 공통 담기 함수
        function addToCart(productId) {
            fetch('/add_to_cart/' + productId, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('cart-badge').innerText = data.cart_count;
                }
            });
        }
    </script>
</body>
</html>
