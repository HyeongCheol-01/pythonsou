<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커피 전문점 설문조사</title>
</head>
<body>
    <h3>커피 전문점에 대한 소비자 인식 조사</h3>
    <form action="/coffee/surveyprocess" method="post">
        <table border="0">
            <tr>
                <td>귀하의 성별은?</td>
                <td>
                    <input type="radio" id="genM" name="gender" value="남" checked>
                    <label for="genM">남</label>
                    &nbsp;&nbsp;
                    <input type="radio" id="genF" name="gender" value="여">
                    <label for="forF">여</label>
                </td>
            </tr>
            <tr>
                <td>귀하의 나이는?</td>
                <td>
                    <input type="radio" id="age20" name="age" value="10" checked>
                    <label for="age20">10대</label>
                    &nbsp;
                    <input type="radio" id="age20" name="age" value="20">
                    <label for="age20">20대</label>
                    &nbsp;
                    <input type="radio" id="age30" name="age" value="30">
                    <label for="age30">30대</label>
                    &nbsp;
                    <input type="radio" id="age40" name="age" value="40">
                    <label for="age40">40대</label>
                    &nbsp;
                    <input type="radio" id="age40" name="age" value="50">
                    <label for="age50">50대 이상</label>
                </td>
            </tr>
            <tr>
                <td>귀하의 나이는?</td>
                <td>
                    <input type="radio" id="star" name="co_survey" value="스타벅스" checked>
                    <label for="star">스타벅스</label>
                    &nbsp;
                    <input type="radio" id="paul" name="co_survey" value="폴바셋">
                    <label for="paul">폴바셋</label>
                    &nbsp;
                    <input type="radio" id="ediya" name="co_survey" value="이디야">
                    <label for="ediya">이디야</label>
                    &nbsp;
                    <input type="radio" id="tom" name="co_survey" value="탐앤탐스">
                    <label for="tom">탐앤탐스</label>
                </td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <br>
                    <input type="submit" value="설문완료">
                    <input type="reset" value="초기화">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
